<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EduVerify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./static/css/styles.css">
</head>

<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex items-center justify-center p-4">

    <div
        class="bg-white p-8 md:p-12 rounded-2xl shadow-xl w-full max-w-lg border border-slate-200 relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-emerald-400"></div>

        <div class="text-center mb-8">
            <i class="fa-solid fa-user-plus text-blue-600 text-4xl mb-4"></i>
            <h2 class="text-3xl font-bold">Create Account</h2>
            <p class="text-slate-500 mt-2">Join the Smart Assignment Platform</p>
        </div>

        <form id="registerForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Role</label>
                <select id="role"
                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    <option value="student">Student</option>
                    <option value="teacher">Teacher / Admin</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
                    <input type="text" id="name" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                        placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Department</label>
                    <input type="text" id="department" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                        placeholder="Computer Science">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                    placeholder="student@university.edu">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" id="password" required
                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                    placeholder="••••••••">
            </div>

            <!-- Conditional Field for Student / Teacher -->
            <div id="extraField">
                <label class="block text-sm font-medium text-slate-700 mb-1" id="extraLabel">Semester</label>
                <input type="text" id="extraInput" required
                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                    placeholder="e.g. 5th Semester">
            </div>

            <button type="submit"
                class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold shadow-lg hover:shadow-blue-500/30 transition-all">
                Sign Up
            </button>
        </form>

        <p class="text-center mt-6 text-slate-600">
            Already have an account? <a href="login.html" class="text-blue-600 font-semibold hover:underline">Log in
                now</a>
        </p>
    </div>

    <script>
        // Update extra field based on role selection
        const roleSelect = document.getElementById('role');
        const extraLabel = document.getElementById('extraLabel');
        const extraInput = document.getElementById('extraInput');

        // Check URLparams if directed from landing page buttons
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('role')) {
            roleSelect.value = urlParams.get('role');
        }

        function updateForm() {
            if (roleSelect.value === 'teacher') {
                extraLabel.innerText = "Subject Expert";
                extraInput.placeholder = "e.g. Data Structures";
            } else {
                extraLabel.innerText = "Semester";
                extraInput.placeholder = "e.g. 5th Semester";
            }
        }

        roleSelect.addEventListener('change', updateForm);
        updateForm();

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const role = roleSelect.value;
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                department: document.getElementById('department').value
            };

            if (role === 'student') {
                data.semester = extraInput.value;
            } else {
                data.subject = extraInput.value;
            }

            try {
                const response = await fetch(`http://localhost:8000/api/auth/register/${role}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (response.ok) {
                    alert(`${role.charAt(0).toUpperCase() + role.slice(1)} registered successfully!`);
                    window.location.href = 'login.html';
                } else {
                    alert(result.detail || 'Registration failed');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Could not connect to the server. Make sure the backend is running at http://localhost:8000');
            }
        });
    </script>
</body>

</html>
