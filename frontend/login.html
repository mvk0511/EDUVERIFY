<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduVerify</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./static/css/styles.css">
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .role-radio:checked + div {
            background-color: #eff6ff;
            border-color: #3b82f6;
            color: #1d4ed8;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-graduation-cap text-blue-600 text-3xl"></i>
            </div>
            <h2 class="text-3xl font-bold text-slate-800 tracking-tight">EduVerify</h2>
            <p class="text-slate-500 mt-2 text-sm">Please log in to access your portal</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Select Account Type</label>
                <div class="flex gap-4">
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="role" value="student" checked class="role-radio sr-only">
                        <div class="py-3 text-center border border-slate-200 rounded-lg text-slate-600 font-medium transition-all hover:bg-slate-50">
                            <i class="fa-solid fa-user-graduate mr-2"></i>Student
                        </div>
                    </label>
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="role" value="teacher" class="role-radio sr-only">
                        <div class="py-3 text-center border border-slate-200 rounded-lg text-slate-600 font-medium transition-all hover:bg-slate-50">
                            <i class="fa-solid fa-chalkboard-user mr-2"></i>Teacher
                        </div>
                    </label>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                    <div class="relative">
                        <i class="fa-regular fa-envelope absolute left-4 top-3.5 text-slate-400"></i>
                        <input type="email" id="email" required class="w-full pl-11 pr-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm" placeholder="user@university.edu" value="demo@university.edu">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-sm font-medium text-slate-700">Password</label>
                        <a href="#" class="text-sm text-blue-600 hover:text-blue-800 hover:underline">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-3.5 text-slate-400"></i>
                        <input type="password" id="password" required class="w-full pl-11 pr-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm" placeholder="••••••••" value="demo123">
                    </div>
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-lg shadow-blue-600/30 transition-all flex justify-center items-center gap-2">
                    Login securely <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>

            <p class="text-center text-slate-600 text-sm mt-6">
                Don't have an account? <a href="register.html" class="text-blue-600 font-bold hover:underline">Register now</a>
            </p>
        </form>
    </div>

    <!-- Scripts -->
    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = loginForm.querySelector('button[type="submit"]');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const role = document.querySelector('input[name="role"]:checked').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...';
            loginBtn.disabled = true;

            try {
                const response = await fetch('http://127.0.0.1:8000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, role })
                });
                const result = await response.json();

                if (response.ok) {
                    localStorage.setItem('currentUser', JSON.stringify({
                        id: result.user_id,
                        name: result.name,
                        role: result.role
                    }));

                    if (result.role === 'student') {
                        window.location.href = 'dashboard_student.html';
                    } else {
                        window.location.href = 'dashboard_teacher.html';
                    }
                } else {
                    alert('Login Failed: ' + (result.detail || 'Incorrect credentials.'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Connection to server failed. Please ensure the backend is running.');
            } finally {
                loginBtn.innerHTML = 'Login securely <i class="fa-solid fa-arrow-right"></i>';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
